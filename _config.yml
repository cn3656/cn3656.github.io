title: Atom Blog
subtitle: A lightweight blog powered by Atom
description: A modern, fast, and extensible static blog
author: Atom
language: zh-CN
timezone: Asia/Shanghai
url: https://atom.github.io
root: /
theme: default
per_page: 10
pagination_dir: page
permalink: :year/:month/:day/:title/
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories

deploy:
  type: git
  repo: https://github.com/atom/atom.github.io.git
  branch: main

plugins: []

menu:
  首页: /
  归档: /archives/
  分类: /categories/
  标签: /tags/
  留言: /contact/
  友链: /friends/
  关于: /about/

social:
  GitHub: https://github.com/cn3656

seo:
  google_analytics: ""

