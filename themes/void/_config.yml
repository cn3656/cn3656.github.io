# VOID Theme Config
# 移植自 Typecho-Theme-VOID (https://github.com/AlanDecode/Typecho-Theme-VOID)

# 首页横幅
banner:
  enable: true
  title: ""          # 留空使用站点标题
  subtitle: ""       # 留空使用站点副标题

# 侧边目录
toc:
  enable: true

# 文章样式: "default" | "full-content"
post_style: default

# 社交链接（使用 Font Awesome 图标）
social_icons: []
